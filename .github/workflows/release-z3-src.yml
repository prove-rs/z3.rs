name: Release z3-src

on:
  workflow_dispatch:
    inputs:
      z3_version:
        description: "Z3 upstream version being released (e.g. 4.16.0), for documentation only"
        required: true
        type: string

jobs:
  release-z3-src:
    name: Publish z3-src to crates.io
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'prove-rs' }}
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Authenticate with crates.io
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Get crate version
        id: crate_version
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "z3-src") | .version')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Publish z3-src
        run: cargo publish -p z3-src --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "z3-src-v${{ steps.crate_version.outputs.version }}" \
            -m "z3-src v${{ steps.crate_version.outputs.version }} (Z3 ${{ inputs.z3_version }})"
          git push origin "z3-src-v${{ steps.crate_version.outputs.version }}"
