name: Rust

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_INCREMENTAL: 0
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  RUSTFLAGS: "-D warnings"
  EMSCRIPTEN_VERSION: "latest"

jobs:
  check-formatting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check formatting
        run: cargo fmt -- --check

  build:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Remove preinstalled Z3 (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          # Remove any z3 package installed via apt/dpkg (including library packages)
          sudo apt-get remove -y z3 libz3-4 libz3-dev || true
          # Remove common binary locations in case z3 is baked into the image or toolcache
          sudo rm -f /usr/bin/z3 /usr/local/bin/z3 || true
          sudo rm -rf /opt/hostedtoolcache/*/z3* || true
          # Refresh shell cache
          hash -r || true
      - name: Install Z3
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'macos-latest'
        id: z3
        uses: cda-tum/setup-z3@v1
        with:
          version: "4.16.0"
          add_to_library_path: true
      - name: Z3 version
        run: z3 --version
      - name: Run tests
        run: cargo test --workspace --features num

  build_on_wasm:
    # if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Clone emsdk
        run: |
          cd ~
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git
          echo "EMSDK_TAG=$(cd ~/emsdk && git describe --tags --always)" >> $GITHUB_ENV

      - name: Cache emsdk toolchain
        id: cache-emsdk
        uses: actions/cache@v5
        with:
          path: ~/emsdk
          key: emsdk-${{ env.EMSDK_TAG }}
          restore-keys: emsdk-

      - name: Install emscripten
        if: steps.cache-emsdk.outputs.cache-hit != 'true'
        run: |
          cd ~/emsdk
          ./emsdk install ${{ env.EMSCRIPTEN_VERSION }}
          ./emsdk activate ${{ env.EMSCRIPTEN_VERSION }}
      - name: Install wasm32-unknown-emscripten target
        run: rustup target add wasm32-unknown-emscripten
      - uses: Swatinem/rust-cache@v2
      - name: Build z3-sys and z3 with vendored Z3
        run: |
          source ~/emsdk/emsdk_env.sh
          cargo build --target=wasm32-unknown-emscripten --features "vendored,num"

  build_with_vendored_z3:
    # if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        build: [linux, macos, windows]
        include:
          - build: linux
            os: ubuntu-latest
          - build: macos
            os: macos-latest
          - build: windows
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install LLVM and Clang # required for bindgen to work, see https://github.com/rust-lang/rust-bindgen/issues/1797
        uses: KyleMayes/install-llvm-action@v2
        if: matrix.os == 'windows-latest'
        with:
          version: "11.0"
          directory: ${{ runner.temp }}/llvm
      - name: Set LIBCLANG_PATH
        run: echo "LIBCLANG_PATH=$((gcm clang).source -replace "clang.exe")" >> $env:GITHUB_ENV
        if: matrix.os == 'windows-latest'
      - uses: Swatinem/rust-cache@v2
      - name: Test `z3-sys` and `z3` with vendored linked Z3
        run: cargo test --workspace --features "vendored,num"

  build_with_vcpkg_installed_z3:
    strategy:
      matrix:
        build: [linux, macos, windows]
        include:
          - build: linux
            os: ubuntu-latest
            vcpkg_triplet: x64-linux
          - build: macos
            os: macos-latest
            vcpkg_triplet: arm64-osx
          - build: windows
            os: windows-latest
            vcpkg_triplet: x64-windows-static-md
    runs-on: ${{ matrix.os }}
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install LLVM and Clang # required for bindgen to work, see https://github.com/rust-lang/rust-bindgen/issues/1797
        uses: KyleMayes/install-llvm-action@v2
        if: matrix.os == 'windows-latest'
        with:
          version: "11.0"
          directory: ${{ runner.temp }}/llvm
      - name: Set LIBCLANG_PATH
        run: echo "LIBCLANG_PATH=$((gcm clang).source -replace "clang.exe")" >> $env:GITHUB_ENV
        if: matrix.os == 'windows-latest'
      - run: echo  Instaling z3:${{ matrix.vcpkg_triplet }} on ${{ matrix.os }}.
      - name: Cache vcpkg binary packages
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/vcpkg_binary_cache
          # run_id suffix ensures we always save; restore-keys picks up the latest
          # prior entry for this triplet. vcpkg keys entries by ABI hash internally,
          # so stale files from old compiler versions are simply ignored.
          key: vcpkg-${{ matrix.vcpkg_triplet }}-${{ github.run_id }}
          restore-keys: vcpkg-${{ matrix.vcpkg_triplet }}-
      - name: vcpkg build z3
        uses: johnwason/vcpkg-action@v7
        id: vcpkg
        with:
          pkgs: z3
          triplet: ${{ matrix.vcpkg_triplet }}
          revision: master
          token: ${{ github.token }}
          extra-args: --clean-buildtrees-after-build
        env:
          VCPKG_BINARY_SOURCES: "clear;files,${{ runner.temp }}/vcpkg_binary_cache,readwrite"
      - name: Show default toolchain of rust.
        run: rustup default
      - name: Test `z3-sys` and `z3` with vcpkg installed Z3
        run: cargo test --workspace --features "vcpkg,num"

  run_clippy:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Z3
        run: brew install z3
      - name: Run clippy
        run: cargo clippy --workspace --all-targets --features num

  build_with_gh_release_z3:
    # if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        build: [linux, macos, windows]
        include:
          - build: linux
            os: ubuntu-latest
          - build: macos
            os: macos-latest
          - build: windows
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Test `z3-sys` and `z3` with gh-release linked Z3
        run: cargo test --workspace --features "gh-release,num"
        env:
          READ_ONLY_GITHUB_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
